<div class="container mt-5">
  <div class="row d-flex justify-content-end">
    <button mat-raised-button color="primary" routerLink="addProduct">Add Product</button>
  </div>
  <div class="row">
    <div class="col-md-4">
      <div class="card"  *ngIf="getAllProducts.length >0 ;  else noData">
        <div class="card-body">
          <p class="alert alert-success text-center">Product List</p>
          <ul class="list-group">
            <li class="list-group-item"
            routerLinkActive="active"
             *ngFor="let product of getAllProducts"
             [routerLink]="['/products',product.productId]"
             >
              {{ product.productName }}
            </li>
          </ul>
        </div>
      </div>
      .
    </div>
    <div class="col-md-8">
        <router-outlet></router-outlet>
    </div>
  </div>
</div>
<ng-template #noData>
  <p class="alert alert-danger">NO PRODUCT DATA..!</p>
</ng-template>
